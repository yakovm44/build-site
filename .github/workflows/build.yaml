name: Build and Push Docker Image to Nexus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Nexus Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NEXUS_REPO_URL }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      # - name: Configure insecure registry
      #   run: |
      #     sudo echo '{"insecure-registries": ["${{ secrets.NEXUS_REPO_URL }}"]}' > /etc/docker/daemon.json
   
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # - name: Build and Push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
      #     tags: |
      #       ${{ secrets.NEXUS_REPO_URL }}/dummysite:latest

      - name:  '🐳 Build and push Docker image'
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 192.168.68.101:8082/build-site:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        