name: Build and Push Docker Image to Nexus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Nexus connectivity
        run: |
           curl -v --max-time 10 http://${{ secrets.NEXUS_REPO_URL }}/v2/ || true
           nc -zv $(echo ${{ secrets.NEXUS_REPO_URL }} | cut -d: -f1) \
           $(echo ${{ secrets.NEXUS_REPO_URL }} | cut -d: -f2) || true



      - name: Log in to Nexus Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NEXUS_REPO_URL }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          tags: |
            ${{ secrets.NEXUS_URL }}/your-repo-name/your-image:latest
            ${{ secrets.NEXUS_URL }}/your-repo-name/your-image:${{ github.sha }}